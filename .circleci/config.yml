version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.87"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.2.0
  orb-tools: circleci/orb-tools@12.4.0
  gen-circleci-orb: jerus-org/gen-circleci-orb@0.0.30

workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/

      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only:
                - /pull\/[0-9]+/

      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main

      - toolkit/test_doc_build:
          filters:
            branches:
              ignore: main

      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main

      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only:
                - main
                - /pull\/[0-9]+/

      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

      - toolkit/code_coverage:
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

      - gen-circleci-orb/build_rust_binary:
          name: build-binary
          package: gen-orb-mcp
          requires:
            - toolkit/common_tests
      - gen-circleci-orb/generate:
          name: regenerate-orb
          binary: gen-orb-mcp
          orb_namespace: jerus-org
          orb_dir: orb
          attach_workspace: true
          git_push_subcommand: save
          requires:
            - build-binary
      - orb-tools/pack:
          name: pack-orb
          source_dir: orb/src
          requires: [regenerate-orb]
      - orb-tools/review:
          name: review-orb
          source_dir: orb/src
          requires: [pack-orb]

  orb-release:
    jobs:
      - gen-circleci-orb/build_rust_binary:
          name: orb-release-binary
          package: gen-orb-mcp
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - orb-tools/pack:
          name: orb-release-pack
          checkout: false
          source_dir: orb/src
          pre-steps:
            - checkout
            - run:
                name: Inject release version into executor default tag
                command: |
                  VERSION=${CIRCLE_TAG#gen-orb-mcp-v}
                  echo "Injecting version: ${VERSION}"
                  sed -i "s/default: latest/default: ${VERSION}/" orb/src/executors/default.yml
                  echo "Updated executor:"
                  cat orb/src/executors/default.yml
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/build_container:
          name: orb-release-container
          binary: gen-orb-mcp
          docker_namespace: jerusdp
          orb_dir: orb
          crate_tag_prefix: gen-orb-mcp-v
          requires: [orb-release-binary]
          context: [docker]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/ensure_orb_registered:
          name: orb-release-ensure-registered-jerus-org
          orb_name: jerus-org/gen-orb-mcp
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - orb-tools/publish:
          name: publish-orb-jerus-org
          pre-steps:
            - run:
                name: Normalize CIRCLE_TAG for orb version
                command: |
                  VERSION=${CIRCLE_TAG#gen-orb-mcp-v}
                  echo "export CIRCLE_TAG=v${VERSION}" >> "$BASH_ENV"
          orb_name: jerus-org/gen-orb-mcp
          pub_type: production
          vcs_type: github
          enable_pr_comment: false
          requires: [orb-release-container, orb-release-pack, orb-release-ensure-registered-jerus-org]
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/build_mcp_server:
          name: build-mcp-server
          binary_name: gen-orb-mcp
          tag_prefix: gen-orb-mcp-v
          orb_path: orb/src/@orb.yml
          earliest_version: "0.1.11"
          requires: [publish-orb-jerus-org]
          context:
            - release
            - bot-check
            - pcu-app
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/
