version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.87"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.2.0

  orb-tools: circleci/orb-tools@12.3.3

jobs:
  regenerate-orb:
    docker:
      - image: ubuntu:24.04
    steps:
      - checkout
      - run:
          name: Install gen-circleci-orb
          command: |
            apt-get update -qq && apt-get install -y --no-install-recommends curl ca-certificates
            curl -L --proto '=https' --tlsv1.2 -sSf \
              https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> "$BASH_ENV"
            source "$BASH_ENV"
            cargo-binstall --no-confirm gen-circleci-orb
            cargo-binstall --no-confirm gen-orb-mcp
      - run:
          name: Regenerate orb source
          command: |
            gen-circleci-orb generate \
              --binary gen-orb-mcp \
              --namespace jerus-org \
              --orb-dir orb

workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/

      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only:
                - /pull\/[0-9]+/

      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main

      - toolkit/test_doc_build:
          filters:
            branches:
              ignore: main

      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main

      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only:
                - main
                - /pull\/[0-9]+/

      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

      - toolkit/code_coverage:
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

      - regenerate-orb:
          requires: [toolkit/common_tests]
      - orb-tools/pack:
          name: pack-orb
          source_dir: orb/src
          requires: [regenerate-orb]
      - orb-tools/review:
          name: review-orb
          source_dir: orb/src
          requires: [pack-orb]
