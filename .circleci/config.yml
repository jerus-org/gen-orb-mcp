version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.87"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.2.0

  orb-tools: circleci/orb-tools@12.3.3
jobs:
  build-binary:
    docker:
      - image: rust:latest
    steps:
      - checkout
      - run:
          name: Build binary
          command: cargo build --release
      - persist_to_workspace:
          root: target/release
          paths: [gen-orb-mcp]
  regenerate-orb:
    docker:
      - image: jerusdp/gen-circleci-orb:latest
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/bin
      - run:
          name: Regenerate orb source
          command: |
            export PATH="/tmp/bin:$PATH"
            gen-circleci-orb generate \
              --binary gen-orb-mcp \
              --namespace jerus-org \
              --orb-dir orb


workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/

      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only:
                - /pull\/[0-9]+/

      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main

      - toolkit/test_doc_build:
          filters:
            branches:
              ignore: main

      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main

      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only:
                - main
                - /pull\/[0-9]+/

      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

      - toolkit/code_coverage:
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

      - build-binary:
          requires: [toolkit/common_tests]
      - regenerate-orb:
          requires: [build-binary]
      - orb-tools/pack:
          name: pack-orb
          source_dir: orb/src
          requires: [regenerate-orb]
      - orb-tools/review:
          name: review-orb
          source_dir: orb/src
          requires: [pack-orb]
