version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.91"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.5.0

  gen-orb-mcp: jerus-org/gen-orb-mcp@0.1.47
  orb-tools: circleci/orb-tools@12.4.0
  # >>> gen-circleci-orb (managed — edits overwritten by 'gen-circleci-orb update')
  gen-circleci-orb: jerus-org/gen-circleci-orb@0.0.53
  # <<< gen-circleci-orb
workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/

      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only:
                - /pull\/[0-9]+/

      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main

      - toolkit/test_doc_build:
          filters:
            branches:
              ignore: main

      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main

      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>

      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only:
                - /pull\/[0-9]+/

      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/

      - toolkit/code_coverage:
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

      # End push: regenerate WITH record (signed commit + push), gated on the
      # orb validations (atomic). add_ssh_keys loads the org write key
      # (ssh_fingerprint) so the push has write authority; `release` supplies
      # the GPG signing material.
      #
      # Only runs on same-repo, non-main branches: the regenerated orb is
      # committed back to the PR branch (and reaches main via the merge). It
      # must NOT run on `main` — main is protected and the bot has no authority
      # to push to it directly — nor on forked PRs (`pull/N`), which are
      # read-only.
      # >>> gen-circleci-orb (managed — edits overwritten by 'gen-circleci-orb update')
      - gen-circleci-orb/build_rust_binary:
          name: build-binary
          package: gen-orb-mcp
      - gen-circleci-orb/generate:
          name: regenerate-orb
          binary: gen-orb-mcp
          orb_namespace: jerus-org
          orb_dir: orb
          attach_workspace: true
          ssh_fingerprint: "SHA256:OkxsH8Z6Iim6WDJBaII9eTT9aaO1f3eDc6IpsgYYPVg"
          persist_orb_workspace: true
          context: [release]
          requires: [build-binary, toolkit/common_tests]
          filters:
            branches:
              ignore:
                - main
      - orb-tools/pack:
          name: pack-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [regenerate-orb]
          filters:
            branches:
              ignore:
                - main
      - orb-tools/review:
          name: review-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [pack-orb]
          filters:
            branches:
              ignore:
                - main
      # <<< gen-circleci-orb

  # >>> gen-circleci-orb (managed — edits overwritten by 'gen-circleci-orb update')
  orb-release:
    jobs:
      - gen-circleci-orb/build_rust_binary:
          name: orb-release-binary
          package: gen-orb-mcp
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/generate:
          name: verify-orb
          binary: gen-orb-mcp
          orb_namespace: jerus-org
          orb_dir: orb
          attach_workspace: true
          check: true
          requires: [orb-release-binary]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - orb-tools/pack:
          name: orb-release-pack
          checkout: false
          source_dir: orb/src
          requires: [verify-orb]
          pre-steps:
            - checkout
            - run:
                name: Inject release version into executor default tag
                command: |
                  VERSION=${CIRCLE_TAG#gen-orb-mcp-v}
                  echo "Injecting version: ${VERSION}"
                  sed -i "s/default: latest/default: ${VERSION}/" orb/src/executors/default.yml
                  echo "Updated executor:"
                  cat orb/src/executors/default.yml
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/build_container:
          name: orb-release-container
          binary: gen-orb-mcp
          docker_namespace: jerusdp
          orb_dir: orb
          crate_tag_prefix: gen-orb-mcp-v
          requires: [verify-orb]
          context: [docker]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/ensure_orb_registered:
          name: orb-release-ensure-registered-jerus-org
          orb_name: jerus-org/gen-orb-mcp
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - orb-tools/publish:
          name: publish-orb-jerus-org
          pre-steps:
            - run:
                name: Normalize CIRCLE_TAG for orb version
                command: |
                  VERSION=${CIRCLE_TAG#gen-orb-mcp-v}
                  echo "export CIRCLE_TAG=v${VERSION}" >> "$BASH_ENV"
          orb_name: jerus-org/gen-orb-mcp
          pub_type: production
          vcs_type: github
          enable_pr_comment: false
          requires: [orb-release-container, orb-release-pack, orb-release-ensure-registered-jerus-org]
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - gen-orb-mcp/build_mcp_server:
          name: build-mcp-server
          binary_name: gen-orb-mcp
          tag_prefix: gen-orb-mcp-v
          orb_path: orb/src/@orb.yml
          earliest_version: "0.1.11"
          requires: [publish-orb-jerus-org]
          context: [release, bot-check, pcu-app]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/
  # <<< gen-circleci-orb
