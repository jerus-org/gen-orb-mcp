version: 2.1

orbs:
  orb-tools: circleci/orb-tools@12.3.3

jobs:
  build-binary:
    docker:
      - image: rust:latest
    steps:
      - checkout
      - run:
          name: Build release binary
          command: cargo build --release -p gen-orb-mcp
      - persist_to_workspace:
          root: target/release
          paths: [gen-orb-mcp]

  pack-orb:
    executor: orb-tools/default
    steps:
      - checkout
      - run:
          name: Inject release version into executor default tag
          command: |
            VERSION=${CIRCLE_TAG#gen-orb-mcp-v}
            echo "Injecting version: ${VERSION}"
            sed -i "s/default: latest/default: ${VERSION}/" orb/src/executors/default.yml
            echo "Updated executor:"
            cat orb/src/executors/default.yml
      - run:
          name: Pack orb
          command: circleci orb pack orb/src > orb.yml
      - persist_to_workspace:
          root: .
          paths: [orb.yml]

  build-container:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: /tmp/bin
      - run:
          name: Build and push Docker image
          command: |
            VERSION=${CIRCLE_TAG#gen-orb-mcp-v}
            cp /tmp/bin/gen-orb-mcp orb/gen-orb-mcp
            docker build \
              -t jerusdp/gen-orb-mcp:${VERSION} \
              -t jerusdp/gen-orb-mcp:latest \
              orb
            echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker push jerusdp/gen-orb-mcp:${VERSION}
            docker push jerusdp/gen-orb-mcp:latest

  ensure-orb-registered:
    executor: orb-tools/default
    steps:
      - run:
          name: Ensure orb is registered
          command: |
            set +e
            circleci setup --token "${CIRCLE_TOKEN}" --host https://circleci.com --no-prompt
            setup_exit=$?
            set -e
            if [ "${setup_exit}" -ne 0 ] && [ "${setup_exit}" -ne 255 ]; then
              echo "circleci setup failed with exit ${setup_exit}" >&2
              exit "${setup_exit}"
            fi
            set +e
            circleci orb info jerus-org/gen-orb-mcp
            orb_info_exit=$?
            set -e
            echo "orb info exit: ${orb_info_exit}"
            if [ "${orb_info_exit}" -ne 0 ] && [ "${orb_info_exit}" -ne 255 ]; then
              set +e
              create_output=$(circleci orb create jerus-org/gen-orb-mcp --no-prompt 2>&1)
              create_exit=$?
              set -e
              echo "${create_output}"
              if [ "${create_exit}" -ne 0 ] && ! echo "${create_output}" | grep -q "already exists"; then
                exit "${create_exit}"
              fi
            fi
            echo "Orb is registered."

workflows:
  orb-release:
    jobs:
      - build-binary:
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - pack-orb:
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - build-container:
          requires: [build-binary]
          context: [docker]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - ensure-orb-registered:
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/

      - orb-tools/publish:
          name: publish-orb
          pre-steps:
            - run:
                name: Normalize CIRCLE_TAG for orb version
                command: |
                  VERSION=${CIRCLE_TAG#gen-orb-mcp-v}
                  echo "export CIRCLE_TAG=v${VERSION}" >> "$BASH_ENV"
          orb_name: jerus-org/gen-orb-mcp
          pub_type: production
          vcs_type: github
          requires: [build-container, pack-orb, ensure-orb-registered]
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-orb-mcp-v.*/
            branches:
              ignore: /.*/
