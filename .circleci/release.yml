version: 2.1

parameters:
  gen_orb_mcp_version:
    type: string
    default: ""
    description: "Override gen-orb-mcp crate version (empty = nextsv auto-detect)"
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.0.0

jobs:
  tools:
    executor: toolkit/rust_env_rolling
    steps:
      - run:
          name: Verify tools
          command: |
            set -ex
            nextsv --version
            pcu --version
            cargo release --version
            rsign --version

workflows:
  release:
    jobs:
      - tools

      - toolkit/calculate_versions:
          name: calculate-versions
          requires: [tools]
          crates: "gen-orb-mcp:gen-orb-mcp-v"
          crate_version_overrides: "gen-orb-mcp:<< pipeline.parameters.gen_orb_mcp_version >>"
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires: [calculate-versions]

      - toolkit/release_crate:
          name: release-gen-orb-mcp
          requires: [approve-release]
          package: gen-orb-mcp
          crate_tag_prefix: gen-orb-mcp-v
          build_binary: true
          binary_name: gen-orb-mcp
          context:
            - release
            - bot-check
            - pcu-app

      - toolkit/release_prlog:
          requires: [release-gen-orb-mcp]
          context:
            - release
            - bot-check
            - pcu-app
