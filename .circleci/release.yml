version: 2.1

parameters:
  gen_orb_mcp_version:
    type: string
    default: ""
    description: "Override gen-orb-mcp crate version (empty = nextsv auto-detect)"
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.2.0

  orb-tools: circleci/orb-tools@12.3.3
  docker: circleci/docker@3.0.1
jobs:
  tools:
    executor: toolkit/rust_env_rolling
    steps:
      - run:
          name: Verify tools
          command: |
            set -ex
            nextsv --version
            pcu --version
            cargo release --version
            rsign --version

  build-binary-release:
    docker:
      - image: rust:latest
    steps:
      - checkout
      - run:
          name: Build release binary
          command: cargo build --release -p gen-orb-mcp
      - persist_to_workspace:
          root: target/release
          paths: [gen-orb-mcp]
  ensure-orb-registered-jerus-org:
    executor: orb-tools/default
    steps:
      - run:
          name: Ensure orb is registered
          command: |
            set +e
            circleci setup --token "${CIRCLE_TOKEN}" --host https://circleci.com --no-prompt
            setup_exit=$?
            set -e
            if [ "${setup_exit}" -ne 0 ] && [ "${setup_exit}" -ne 255 ]; then
              echo "circleci setup failed with exit ${setup_exit}" >&2
              exit "${setup_exit}"
            fi
            set +e
            circleci orb info jerus-org/gen-orb-mcp
            orb_info_exit=$?
            set -e
            echo "orb info exit: ${orb_info_exit}"
            if [ "${orb_info_exit}" -ne 0 ] && [ "${orb_info_exit}" -ne 255 ]; then
              set +e
              create_output=$(circleci orb create jerus-org/gen-orb-mcp --no-prompt 2>&1)
              create_exit=$?
              set -e
              echo "${create_output}"
              if [ "${create_exit}" -ne 0 ] && ! echo "${create_output}" | grep -q "already exists"; then
                exit "${create_exit}"
              fi
            fi
            echo "Orb is registered."
  build-container:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: /tmp/release-versions
      - attach_workspace:
          at: /tmp/bin
      - run:
          name: Build and push Docker image
          command: |
            source /tmp/release-versions/versions.env
            VERSION=${CRATE_VERSION_GEN_ORB_MCP}
            if [ "${VERSION}" = "none" ] || [ -z "${VERSION}" ]; then
              echo "No crate version calculated. Skipping container build."
              circleci-agent step halt
              exit 0
            fi
            cp /tmp/bin/gen-orb-mcp orb/gen-orb-mcp
            docker build -t jerusdp/gen-orb-mcp:${VERSION} -t jerusdp/gen-orb-mcp:latest orb
            echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker push jerusdp/gen-orb-mcp:${VERSION}
            docker push jerusdp/gen-orb-mcp:latest
workflows:
  release:
    jobs:
      - tools

      - toolkit/calculate_versions:
          name: calculate-versions
          requires: [tools]
          crates: "gen-orb-mcp:gen-orb-mcp-v"
          crate_version_overrides: "gen-orb-mcp:<< pipeline.parameters.gen_orb_mcp_version >>"
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires: [calculate-versions]

      - toolkit/release_crate:
          name: release-gen-orb-mcp
          requires: [approve-release]
          package: gen-orb-mcp
          crate_tag_prefix: gen-orb-mcp-v
          build_binary: true
          binary_name: gen-orb-mcp
          context:
            - release
            - bot-check
            - pcu-app

      - toolkit/release_prlog:
          requires: [release-gen-orb-mcp]
          context:
            - release
            - bot-check
            - pcu-app
      - build-binary-release:
          requires: [release-gen-orb-mcp]
      - orb-tools/pack:
          name: pack-orb-release
          source_dir: orb/src
          requires: [release-gen-orb-mcp]
      - build-container:
          requires: [build-binary-release]
          context: [docker]
      - ensure-orb-registered-jerus-org:
          requires: [release-gen-orb-mcp]
          context: [orb-publishing]
      - orb-tools/publish:
          name: publish-orb-jerus-org
          pre-steps:
            - attach_workspace:
                at: /tmp/release-versions
            - run:
                name: Export orb version as CIRCLE_TAG
                command: |
                  source /tmp/release-versions/versions.env
                  if [ "${CRATE_VERSION_GEN_ORB_MCP}" = "none" ] || [ -z "${CRATE_VERSION_GEN_ORB_MCP}" ]; then
                    echo "No crate version calculated. Skipping orb publish."
                    circleci-agent step halt
                    exit 0
                  fi
                  echo "export CIRCLE_TAG=v${CRATE_VERSION_GEN_ORB_MCP}" >> "$BASH_ENV"
          orb_name: jerus-org/gen-orb-mcp
          pub_type: production
          vcs_type: github
          requires: [build-container, pack-orb-release, ensure-orb-registered-jerus-org]
          context: [orb-publishing]
