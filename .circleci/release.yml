version: 2.1

parameters:
  gen_orb_mcp_version:
    type: string
    default: ""
    description: "Override gen-orb-mcp crate version (empty = nextsv auto-detect)"
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: jerus-org/circleci-toolkit@4.9.6

jobs:
  tools:
    executor: toolkit/rust_env_rolling
    steps:
      - run:
          name: Verify tools
          command: |
            set -ex
            nextsv --version
            pcu --version
            cargo release --version
            jq --version
            rsign --version

  # Inline variant of toolkit/release_prlog that first installs the latest pcu
  # from git main, validating the GPG-signed workspace tag fix (pcu PR #885)
  # before it reaches the ci-container → toolkit update chain.
  # TODO: remove once toolkit/release_prlog gains an update_pcu parameter.
  release_prlog_with_latest_pcu:
    executor: toolkit/rust_env_rolling
    steps:
      - checkout
      - run:
          name: Install latest pcu from git main
          command: |
            cargo install --force --git https://github.com/jerus-org/pcu --branch main
            pcu --version
      - attach_workspace:
          at: /tmp/release-versions
      - run:
          name: Load approved workspace version
          command: |
            set -eo pipefail
            # shellcheck source=/dev/null
            source /tmp/release-versions/versions.env

            if [ -z "$WORKSPACE_VERSION" ] || [ "$WORKSPACE_VERSION" = "none" ]; then
              echo "No workspace version to release - skipping"
              circleci-agent step halt
              exit 0
            fi

            echo "Approved workspace version: $WORKSPACE_VERSION"
            echo "export NEXT_VERSION=$WORKSPACE_VERSION" >> "$BASH_ENV"
            echo "export SEMVER=$WORKSPACE_VERSION" >> "$BASH_ENV"
      - toolkit/gpg_key
      - toolkit/git_config
      - run:
          name: Pull latest main
          command: git pull --rebase origin main
      - toolkit/make_github_release:
          pcu_prefix: "v"
          pcu_verbosity: "-vv"
          pcu_update_prlog: true

workflows:
  release:
    jobs:
      - tools

      - toolkit/calculate_versions:
          name: calculate-versions
          requires: [tools]
          crates: "gen-orb-mcp:gen-orb-mcp-v"
          crate_version_overrides: "gen-orb-mcp:<< pipeline.parameters.gen_orb_mcp_version >>"
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires: [calculate-versions]

      - toolkit/release_crate:
          name: release-gen-orb-mcp
          requires: [approve-release]
          package: gen-orb-mcp
          crate_tag_prefix: gen-orb-mcp-v
          build_binary: true
          binary_name: gen-orb-mcp
          context:
            - release
            - bot-check
            - pcu-app

      - release_prlog_with_latest_pcu:
          requires: [release-gen-orb-mcp]
          context:
            - release
            - bot-check
            - pcu-app
